<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>String Full-Reverse Then Number-Letter Map (Retro Blue)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
    body {
      font-family: 'Share Tech Mono', monospace;
      background: #031229;
      color: #62e0f9;
      min-height: 100vh;
      letter-spacing: 0.03em;
    }
    .retro-container {
      background: rgba(13,16,55,0.98);
      border: 2.8px solid #25eafd;
      border-radius: 16px;
      max-width: 520px;
      margin: 46px auto 32px auto;
      padding: 32px 26px 23px 26px;
      box-shadow: 0 0 38px #44eaff, 0 0 12px #53b5f7aa inset;
    }
    h1 {
      font-size: 1.38em;
      color: #34d6fe;
      text-shadow: 0 0 14px #75e8ff, 0 0 22px #00e6ff42;
      margin-bottom: 0.35em;
      letter-spacing: 0.087em;
    }
    label {
      color: #b3fbff;
      text-shadow: 0 0 7px #36e4fd;
      display: block;
      margin-top: 18px;
      margin-bottom: 4px;
      font-size: 1.07em;
    }
    input[type="text"] {
      font-family: 'Share Tech Mono', monospace;
      background: #051c37;
      color: #a6fbff;
      border: 1.8px solid #25eafd;
      border-radius: 6px;
      font-size: 1.09em;
      padding: 7px 10px;
      width: 100%;
      box-sizing: border-box;
      outline: none;
      margin-bottom: 8px;
    }
    input[type="text"]:focus {
      border-color: #4efcff;
      box-shadow: 0 0 8px #24d8fe55;
    }
    button {
      background: #0e2f47;
      color: #33f1ff;
      border: 2px solid #49caff;
      border-radius: 6px;
      font-size: 1.02em;
      cursor: pointer;
      box-shadow:
        0 0 16px #33e8fd22,
        0 0 7px #0dfb inset,
        0 0 2px #49f5fd;
      margin-top: 10px;
      padding: 8px 25px;
      font-family: 'Share Tech Mono', monospace;
      outline: none;
      transition: border .19s, box-shadow .12s;
      letter-spacing: 0.05em;
    }
    button:hover, button:focus {
      background: #012c3b;
      color: #fff;
      border-color: #7afbff;
      box-shadow:
        0 0 10px #2efaff,
        0 0 22px #53a9ffa4,
        0 0 25px #2ff2e955;
      text-shadow: 0 0 7px #eafcff;
    }
    .output-box {
      background: #021f35dd;
      border: 2px solid #24e0fd;
      color: #c0faff;
      box-shadow: 0 0 20px #44eaff, 0 0 7px #33fdfdaa inset;
      border-radius: 10px;
      font-family: 'Share Tech Mono', monospace;
      padding: 15px 12px 11px 13px;
      margin: 15px 0 12px 0;
      white-space: pre-wrap;
      font-size: 1.12em;
      word-break: break-word;
      line-height: 1.4;
      max-width: 100%;
      min-height: 38px;
    }
    .copy-group {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 3px;
    }
    .copied {
      color: #a8ffe9;
      background: transparent;
      font-size: .98em;
      text-shadow: 0 0 7px #52f6ff;
      padding-left: 8px;
    }
    @media (max-width: 600px) {
      .retro-container { padding: 6vw 2vw 5vw 2vw; }
      .output-box { font-size: 1em; }
    }
  </style>
</head>
<body>
<div class="retro-container">
  <h1>Reverse &amp; Number→Letter Mapper</h1>
  <label for="userword">Type any phrase or number:</label>
  <input id="userword" type="text" placeholder="e.g. du2 cobb">
  <button onclick="makeMapped()">Reverse + Map</button>
  <div class="copy-group">
    <button onclick="copyOutput()">Copy Output</button>
    <button onclick="downloadOutput()">Download TXT</button>
    <span id="copied-msg" class="copied" style="display:none;">Copied!</span>
  </div>
  <div id="output" class="output-box"></div>
  <div style="margin-top:20px;color:#61dcd0;font-size:.97em;line-height:1.6;">
    Steps:<br>
    1. <b>Reverse the input</b> (e.g. <code>du2 cobb</code> → <code>bboc 2ud</code>)<br>
    2. <b>Replace numbers:</b> 1→A, 2→b, 3→c, 4→d, 5→e, 6→f, 8→h, 9→I, 0→O<br>
    &nbsp;&nbsp;(<code>bboc 2ud</code> → <code>bboc bud</code>)
  </div>
</div>
<script>
const mapping = {"1":"A", "2":"b", "3":"c", "4":"d", "5":"e", "6":"f", "8":"h", "9":"I", "0":"O"};
function makeMapped() {
  let input = document.getElementById('userword').value;
  // Reverse entire string first
  let reversed = [...input].reverse().join('');
  // Then map numbers to letters
  let result = [...reversed].map(ch => mapping[ch] || ch).join('');
  document.getElementById('output').textContent = result;
}
function copyOutput() {
  const el = document.getElementById("output");
  if (!el) return;
  let range = document.createRange();
  range.selectNodeContents(el);
  let sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  try {
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    document.getElementById('copied-msg').style.display = 'inline';
    setTimeout(()=>{document.getElementById('copied-msg').style.display='none';}, 1200);
  } catch(e){
    alert("Copy failed. Please select and copy manually.");
  }
}
function downloadOutput() {
  const box = document.getElementById("output");
  if (!box) return;
  const text = box.textContent;
  const blob = new Blob([text], {type: "text/plain"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = "reverse_number_letter_output.txt";
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},1200);
}
</script>
</body>
</html>
